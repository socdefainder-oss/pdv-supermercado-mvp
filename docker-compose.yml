services:
  postgres:
    image: postgres:16-alpine
    container_name: pdv-supermercado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdv_supermercado
    ports:
      - "5432:5432"
    volumes:
      - pdv_postgres_data:/var/lib/postgresql/data

volumes:
  pdv_postgres_data:
